<svg width="780" height="560" viewBox="0 0 780 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Kuroshio plant snapshot card</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A stylized dashboard card showing Line A-07's daily energy snapshot, with an overlapping circular health-score badge reading 86, a current-draw trace line, and a maintenance recommendation callout.</desc>
<defs>

<linearGradient id="cardGrad" x1="30" y1="30" x2="750" y2="510" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#F8F3E8"/>
<stop offset="55%" stop-color="#DDD2B8"/>
<stop offset="100%" stop-color="#F5EFE0"/>
</linearGradient>
<filter id="cardShadow" x="-40" y="-20" width="860" height="600">
<feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#3D3320" flood-opacity="0.18"/>
</filter>
</defs>

<rect x="30" y="30" width="720" height="480" rx="28" fill="url(#cardGrad)" stroke="#C9BB9C" stroke-opacity="0.5" stroke-width="1" filter="url(#cardShadow)" style="stroke:rgb(201, 187, 156);color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

