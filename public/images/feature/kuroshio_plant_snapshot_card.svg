</text>
<text x="74" y="282" font-family="Inter, sans-serif" font-size="16" fill="#14110D" style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<tspan style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">lunch created </tspan><tspan font-family="'IBM Plex Mono', monospace" font-weight="700" fill="#8A5A16" style="fill:rgb(138, 90, 22);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Mono&quot;, monospace;font-size:16px;font-weight:700;text-anchor:start;dominant-baseline:auto">AED 72</tspan><tspan style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"> of avoidable energy cost,</tspan>
</text>
<text x="74" y="308" font-family="Inter, sans-serif" font-size="16" fill="#14110D" style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
<tspan style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">while health stayed normal at </tspan><tspan font-family="'IBM Plex Mono', monospace" font-weight="700" fill="#0F6E56" style="fill:rgb(15, 110, 86);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;IBM Plex Mono&quot;, monospace;font-size:16px;font-weight:700;text-anchor:start;dominant-baseline:auto">86/100</tspan><tspan style="fill:rgb(20, 17, 13);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">.</tspan>
</text>

