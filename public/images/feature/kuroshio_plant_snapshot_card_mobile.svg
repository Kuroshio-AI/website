<svg width="345" height="570" viewBox="0 0 345 570" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Kuroshio plant snapshot card mobile</title>
  <desc>A narrow dashboard card showing Line A-07 energy use, avoidable cost, machine health, a current-draw trace, and a maintenance recommendation.</desc>
  <defs>
    <linearGradient id="mobileCardGrad" x1="10" y1="14" x2="334" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8F3E8"/>
      <stop offset="55%" stop-color="#DDD2B8"/>
      <stop offset="100%" stop-color="#F5EFE0"/>
    </linearGradient>
    <filter id="mobileCardShadow" x="-40" y="-20" width="425" height="620">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#3D3320" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="10" y="14" width="325" height="526" rx="28" fill="url(#mobileCardGrad)" stroke="#C9BB9C" stroke-opacity="0.5" stroke-width="1" filter="url(#mobileCardShadow)"/>

  <circle cx="46" cy="62" r="3.5" fill="#0F6E56"/>
  <text x="58" y="66" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8A8175">Line A-07 / Today</text>

  <circle cx="296" cy="58" r="31" fill="#FFFFFF" stroke="#E4DCC8" stroke-width="1"/>
  <circle cx="296" cy="58" r="24" fill="none" stroke="#EDE4CE" stroke-width="5"/>
  <circle cx="296" cy="58" r="24" fill="none" stroke="#0F6E56" stroke-width="5" stroke-linecap="round" stroke-dasharray="129.7 21.1" transform="rotate(-90 296 58)"/>
  <text x="296" y="58" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="19" font-weight="700" fill="#14110D">86</text>

  <rect x="36" y="104" width="102" height="38" rx="19" fill="#14110D"/>
  <text x="87" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F3E8">Overview</text>

  <text x="36" y="194" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="600" fill="#14110D">Your plant snapshot</text>

  <text x="36" y="236" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#14110D">
    <tspan>Line A-07 used </tspan><tspan font-family="'IBM Plex Mono', ui-monospace, monospace" font-weight="700">318 kWh</tspan><tspan> today.</tspan>
  </text>
  <text x="36" y="262" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#14110D">Idle periods after lunch created</text>
  <text x="36" y="288" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#14110D">
    <tspan font-family="'IBM Plex Mono', ui-monospace, monospace" font-weight="700" fill="#8A5A16">AED 72</tspan><tspan> of avoidable energy cost.</tspan>
  </text>
  <text x="36" y="314" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#14110D">Machine health stayed normal</text>
  <text x="36" y="340" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#14110D">
    <tspan>at </tspan><tspan font-family="'IBM Plex Mono', ui-monospace, monospace" font-weight="700" fill="#0F6E56">86/100</tspan><tspan>.</tspan>
  </text>

  <text x="36" y="382" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#8A8175">CURRENT DRAW / LAST 24H</text>
  <path d="M36,410 C62,396 85,424 110,406 C136,388 160,420 185,402 C211,384 235,416 260,398 C286,380 305,410 318,400" fill="none" stroke="#BA7517" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="28" y="438" width="289" height="94" rx="22" fill="#FFFFFF" stroke="#EDE4CE" stroke-width="1"/>
  <text x="172.5" y="468" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13.5" fill="#14110D">Good next step: schedule bearing</text>
  <text x="172.5" y="492" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13.5" fill="#14110D">inspection and stagger compressor</text>
  <text x="172.5" y="516" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13.5" fill="#14110D">startup by 5 minutes.</text>
</svg>
